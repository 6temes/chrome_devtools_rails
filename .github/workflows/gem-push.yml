name: Publish Gem

on:
  push:
    tags: ["v*"]

jobs:
  push:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Ruby
        uses: ruby/setup-ruby@12fd324f1d0b43274fdc8130f6980590a667c455 # v1
        with:
          ruby-version: "4.0"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # gem build reads the version from the gemspec (CHROME_DEVTOOLS_RAILS_VERSION),
      # bypassing bundler so the dev-pinned Gemfile.lock doesn't trip frozen mode.
      - name: Configure RubyGems credentials
        uses: rubygems/configure-rubygems-credentials@bc6dd217f8a4f919d6835fcfefd470ef821f5c44 # v1.0.0

      - name: Build and push gem
        env:
          CHROME_DEVTOOLS_RAILS_VERSION: ${{ steps.version.outputs.version }}
        run: |
          gem build chrome_devtools_rails.gemspec
          gem push "chrome_devtools_rails-${CHROME_DEVTOOLS_RAILS_VERSION}.gem"
